<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DICTCAT - S-Pen Dictats</title>
    
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DICTCAT">
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.freepik.com/512/3207/3207092.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.freepik.com/512/3207/3207092.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    
    <style>
        body { 
            touch-action: none; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            -webkit-tap-highlight-color: transparent; 
        }
        #canvas { 
            touch-action: none; 
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px); 
            background-size: 100% 2.5rem; 
            background-color: #fff; 
            cursor: crosshair; 
        }
        .toolbar-btn { transition: all 0.1s; }
        .toolbar-btn:active { transform: scale(0.9); }
        .active-tool { background-color: rgba(255, 255, 255, 0.4) !important; ring: 2px solid white; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .scale-in { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <header class="bg-blue-600 text-white p-3 flex justify-between items-center shadow-lg z-20">
        <div class="flex items-center gap-2">
            <button id="setupBtn" class="p-2 hover:bg-blue-700 rounded-full toolbar-btn" title="Configuració">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <h1 class="text-xl font-black tracking-tight uppercase">DICTCAT</h1>
        </div>
        
        <div class="flex gap-2 items-center">
            <div class="flex bg-blue-800/40 rounded-full p-1 mr-2">
                <button id="penTool" class="p-2 rounded-full toolbar-btn active-tool">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                </button>
                <button id="eraserTool" class="p-2 rounded-full toolbar-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21Z"/><path d="m22 21-14 0"/><path d="m18 11-4-4"/></svg>
                </button>
            </div>
            <button id="clearBtn" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full text-xs font-bold uppercase">Netejar</button>
            <button id="correctBtn" class="bg-yellow-400 hover:bg-yellow-500 text-blue-900 px-5 py-1.5 rounded-full text-sm font-black shadow-md uppercase ml-1 transition-all active:scale-95">Corregir</button>
        </div>
    </header>

    <div id="parentPanel" class="fixed inset-x-0 top-0 bg-slate-800 text-white p-6 transform -translate-y-full z-30 shadow-2xl transition-transform duration-300 border-b border-blue-500/30">
        <div class="max-w-2xl mx-auto">
            <h2 class="text-lg font-bold mb-3 flex items-center gap-2 italic text-blue-300">Text del Dictat (Pare/Mestre)</h2>
            <textarea id="originalText" class="w-full p-4 bg-slate-700 border-none rounded-xl text-lg h-32 text-white outline-none focus:ring-2 focus:ring-blue-500 placeholder-slate-400" placeholder="Escriu aquí el text que dictaràs..."></textarea>
            <div class="mt-4 flex justify-end">
                <button id="closeParentBtn" class="bg-blue-600 px-8 py-2 rounded-lg font-bold shadow-lg hover:bg-blue-500 transition-colors">Guardar i Començar</button>
            </div>
        </div>
    </div>

    <main class="flex-1 relative overflow-hidden bg-white">
        <canvas id="canvas" class="w-full h-full"></canvas>
        <div id="toolIndicator" class="absolute bottom-4 right-4 pointer-events-none bg-white/90 backdrop-blur-md px-4 py-2 rounded-full text-xs font-bold text-slate-600 border border-slate-200 uppercase shadow-lg">Mode: Llapis</div>
    </main>

    <div id="resultModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden scale-in">
            <div class="p-5 bg-blue-600 text-white flex justify-between items-center">
                <h2 class="text-xl font-black uppercase tracking-tight">Correcció del Dictat</h2>
                <button id="closeModal" class="text-white/80 hover:text-white text-3xl font-light leading-none">&times;</button>
            </div>
            <div id="correctionContent" class="p-8 overflow-y-auto text-lg leading-relaxed text-slate-700 italic"></div>
            <div class="p-6 border-t bg-slate-50 flex justify-center">
                <button id="closeModalBtn" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform">Continuar practicant</button>
            </div>
        </div>
    </div>

    <script type="module">
        // PEGA AQUÍ TU CLAVE DE GOOGLE AI STUDIO
        const apiKey = "AIzaSyDGR3Q9JNEDjkoEBQwKKTVY_HEYMTmxuwo"; 
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const setupBtn = document.getElementById('setupBtn');
        const parentPanel = document.getElementById('parentPanel');
        const closeParentBtn = document.getElementById('closeParentBtn');
        const originalText = document.getElementById('originalText');
        const clearBtn = document.getElementById('clearBtn');
        const correctBtn = document.getElementById('correctBtn');
        const resultModal = document.getElementById('resultModal');
        const correctionContent = document.getElementById('correctionContent');
        const closeModal = document.getElementById('closeModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const penTool = document.getElementById('penTool');
        const eraserTool = document.getElementById('eraserTool');
        const toolIndicator = document.getElementById('toolIndicator');

        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let currentMode = 'pen';

        function resizeCanvas() {
            const tempImg = canvas.toDataURL();
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const img = new Image();
            img.src = tempImg;
            img.onload = () => {
                ctx.fillStyle = "white";
                ctx.fillRect(0,0,canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                updateToolStyles();
            };
        }

        function updateToolStyles() {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            if (currentMode === 'pen') {
                ctx.globalCompositeOperation = 'source-over';
                ctx.lineWidth = 3.5;
                ctx.strokeStyle = '#334155';
                toolIndicator.innerText = "Mode: Llapis";
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.lineWidth = 50;
                ctx.strokeStyle = '#ffffff';
                toolIndicator.innerText = "Mode: Goma";
            }
        }

        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
            const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        const onStart = (e) => { isDrawing = true; const p = getPos(e); [lastX, lastY] = [p.x, p.y]; };
        const onMove = (e) => {
            if (!isDrawing) return;
            if (e.cancelable) e.preventDefault(); 
            const p = getPos(e);
            ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
            [lastX, lastY] = [p.x, p.y];
        };
        const onEnd = () => isDrawing = false;

        canvas.addEventListener('mousedown', onStart);
        canvas.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        canvas.addEventListener('touchstart', onStart, {passive:false});
        canvas.addEventListener('touchmove', onMove, {passive:false});
        window.addEventListener('touchend', onEnd);

        penTool.onclick = () => { currentMode = 'pen'; updateToolStyles(); penTool.classList.add('active-tool'); eraserTool.classList.remove('active-tool'); };
        eraserTool.onclick = () => { currentMode = 'eraser'; updateToolStyles(); eraserTool.classList.add('active-tool'); penTool.classList.remove('active-tool'); };
        setupBtn.onclick = () => parentPanel.classList.toggle('-translate-y-full');
        closeParentBtn.onclick = () => parentPanel.classList.add('-translate-y-full');
        clearBtn.onclick = () => { if(confirm("Netejar pantalla?")) { ctx.fillStyle="white"; ctx.fillRect(0,0,canvas.width, canvas.height); } };

        correctBtn.onclick = async () => {
            const original = originalText.value.trim();
            if (!original) { parentPanel.classList.remove('-translate-y-full'); return; }
            
            resultModal.classList.remove('hidden'); resultModal.classList.add('flex');
            correctionContent.innerHTML = `<div class="flex flex-col items-center py-12 gap-5"><div class="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div><p class="font-bold text-blue-600 uppercase">Corregint...</p></div>`;

            try {
                if (!apiKey || apiKey === "TU_CLAVE_AQUI") throw new Error("API Key no configurada.");

                const imageData = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                // HEM CANVIAT EL MODEL A gemini-1.5-flash PER EVITAR EL 404
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: `Ets un mestre català. Analitza la imatge i compara-la amb el text original: "${original}". Transcriu el que veus escrit i corregeix ortografia i gramàtica. Sigues amable i dóna consells per millorar la cal·ligrafia o l'ortografia en català.` },
                                { inlineData: { mimeType: "image/jpeg", data: imageData } }
                            ]
                        }]
                    })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(`${data.error.code}: ${data.error.message}`);
                
                const feedback = data.candidates?.[0]?.content?.parts?.[0]?.text;
                correctionContent.innerHTML = feedback ? feedback.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>') : "Sense resposta.";
            } catch (err) {
                correctionContent.innerHTML = `<div class="p-6 bg-red-50 text-red-700 rounded-2xl border border-red-100"><strong>Error en la correcció</strong><p class="mt-2 text-sm">${err.message}</p></div>`;
            }
        };

        async function fetchWithRetry(url, opts, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, opts);
                    if (res.ok) return res;
                    if (res.status !== 429 || i === retries - 1) return res;
                    await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
                } catch (e) { if (i === retries - 1) throw e; }
            }
        }

        [closeModal, closeModalBtn].forEach(b => b.onclick = () => { resultModal.classList.add('hidden'); resultModal.classList.remove('flex'); });
    </script>
</body>
</html>
