<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>DICTCAT - Dictats en Català</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            touch-action: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #2563eb;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .canvas-container {
            border: 3px solid #2563eb;
            border-radius: 15px;
            background: white;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .result-container {
            margin-top: 30px;
            padding: 20px;
            background: #f3f4f6;
            border-radius: 15px;
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-title {
            font-size: 1.5em;
            color: #1f2937;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .comparison {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        .text-block {
            padding: 15px;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #2563eb;
        }

        .text-block h3 {
            color: #2563eb;
            margin-bottom: 10px;
        }

        .text-content {
            font-size: 18px;
            line-height: 1.8;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 3px 6px;
            border-radius: 4px;
            text-decoration: line-through;
        }

        .correct {
            background: #d1fae5;
            color: #065f46;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #2563eb;
        }

        .stat-label {
            color: #6b7280;
            margin-top: 5px;
        }

        .input-area {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        textarea:focus {
            outline: none;
            border-color: #2563eb;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 DICTCAT</h1>
        
        <div class="input-area">
            <label for="dictadoOriginal">Text original del dictat:</label>
            <textarea id="dictadoOriginal" placeholder="Escriu aquí el text correcte del dictat que dictaràs..."></textarea>
        </div>

        <div class="toolbar">
            <button class="btn-primary" onclick="empezarDictado()">▶️ Començar dictat</button>
            <button class="btn-danger" onclick="borrarCanvas()">🗑️ Esborrar</button>
            <button class="btn-success" onclick="corregirDictado()">✅ Corregir</button>
            <button class="btn-warning" onclick="nuevoIntento()">🔄 Nou intent</button>
        </div>

        <div class="canvas-container">
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>

        <div id="resultContainer" class="result-container">
            <div class="result-title">📊 Resultats de la correcció</div>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="errorCount">0</div>
                    <div class="stat-label">Errors</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="accuracy">100%</div>
                    <div class="stat-label">Encerts</div>
                </div>
            </div>

            <div class="comparison">
                <div class="text-block">
                    <h3>📄 Text original</h3>
                    <div class="text-content" id="originalText"></div>
                </div>
                <div class="text-block">
                    <h3>✏️ El teu text</h3>
                    <div class="text-content" id="escritoText"></div>
                </div>
                <div class="text-block">
                    <h3>🔍 Correcció</h3>
                    <div class="text-content" id="correccionText"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let dibujando = false;
        let textoOriginal = '';
        let textoEscrito = '';

        // Configuración del canvas
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#1f2937';

        function ajustarCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width - 6;
            canvas.height = Math.min(600, window.innerHeight * 0.5);
        }

        ajustarCanvas();
        window.addEventListener('resize', ajustarCanvas);

        function empezarDictado() {
            const texto = document.getElementById('dictadoOriginal').value.trim();
            if (!texto) {
                alert('Si us plau, escriu primer el text del dictat!');
                return;
            }
            textoOriginal = texto;
            borrarCanvas();
            document.getElementById('resultContainer').classList.remove('show');
            alert('Ara pots començar a escriure amb el S-Pen! ✍️');
        }

        function obtenerPosicion(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            if (e.touches) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function iniciarDibujo(e) {
            e.preventDefault();
            dibujando = true;
            const pos = obtenerPosicion(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function dibujar(e) {
            if (!dibujando) return;
            e.preventDefault();
            const pos = obtenerPosicion(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function detenerDibujo(e) {
            e.preventDefault();
            dibujando = false;
            ctx.beginPath();
        }

        // Eventos para mouse
        canvas.addEventListener('mousedown', iniciarDibujo);
        canvas.addEventListener('mousemove', dibujar);
        canvas.addEventListener('mouseup', detenerDibujo);
        canvas.addEventListener('mouseout', detenerDibujo);

        // Eventos para touch/S-Pen
        canvas.addEventListener('touchstart', iniciarDibujo, { passive: false });
        canvas.addEventListener('touchmove', dibujar, { passive: false });
        canvas.addEventListener('touchend', detenerDibujo, { passive: false });

        // Soporte para pointer events (S-Pen)
        canvas.addEventListener('pointerdown', iniciarDibujo);
        canvas.addEventListener('pointermove', dibujar);
        canvas.addEventListener('pointerup', detenerDibujo);

        function borrarCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function corregirDictado() {
            if (!textoOriginal) {
                alert('Primer has de començar un dictat!');
                return;
            }

            // Solicitar el texto escrito
            const input = prompt('Escriu aquí el que has escrit al canvas (mentrestant implementem OCR):');
            if (!input) return;
            
            textoEscrito = input.trim();

            // Normalizar textos
            const palabrasOriginales = textoOriginal.toLowerCase().split(/\s+/);
            const palabrasEscritas = textoEscrito.toLowerCase().split(/\s+/);

            // Comparar palabra por palabra
            let errores = 0;
            let correccionHTML = '';
            
            const maxLen = Math.max(palabrasOriginales.length, palabrasEscritas.length);
            
            for (let i = 0; i < maxLen; i++) {
                const original = palabrasOriginales[i] || '';
                const escrita = palabrasEscritas[i] || '';
                
                if (original !== escrita) {
                    errores++;
                    if (escrita) {
                        correccionHTML += `<span class="error">${escrita}</span> `;
                    }
                    if (original) {
                        correccionHTML += `<span class="correct">${original}</span> `;
                    }
                } else {
                    correccionHTML += `${escrita} `;
                }
            }

            // Calcular precisión
            const precision = Math.max(0, Math.round((1 - errores / palabrasOriginales.length) * 100));

            // Mostrar resultados
            document.getElementById('errorCount').textContent = errores;
            document.getElementById('accuracy').textContent = precision + '%';
            document.getElementById('originalText').textContent = textoOriginal;
            document.getElementById('escritoText').textContent = textoEscrito;
            document.getElementById('correccionText').innerHTML = correccionHTML;
            document.getElementById('resultContainer').classList.add('show');

            // Scroll a resultados
            document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
        }

        function nuevoIntento() {
            borrarCanvas();
            textoEscrito = '';
            document.getElementById('resultContainer').classList.remove('show');
            alert('Canvas esborrat. Pots començar un nou intent! ✍️');
        }

        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrat'))
                    .catch(err => console.log('Error en Service Worker:', err));
            });
        }
    </script>
</body>
</html>
